name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Versionsnummer aus dem Tag lesen (v0.1.0 -> 0.1.0)
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # module.json auf die Tag-Version setzen
      - name: Update version in module.json
        run: |
          jq --arg ver "${{ steps.version.outputs.version }}" '.version = $ver' module.json > module.tmp.json
          mv module.tmp.json module.json

      # ZIP bauen – alles außer .git und .github
      - name: Build ZIP
        run: zip -r DSR_HB.zip . --exclude ".git/*" --exclude ".github/*"

      # Release erstellen und beide Assets hochladen
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DSR_HB.zip
            module.json
